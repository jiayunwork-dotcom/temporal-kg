server:
  port: 8080

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/temporal_kg}
    username: ${SPRING_DATASOURCE_USERNAME:tkg}
    password: ${SPRING_DATASOURCE_PASSWORD:tkg_secret_2024}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc.batch_size: 500
        order_inserts: true
        order_updates: true
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      timeout: 5000
  servlet:
    multipart:
      max-file-size: 500MB
      max-request-size: 500MB

app:
  import:
    batch-size: 5000
    similarity-threshold: 0.85
  model:
    task-queue: ${ML_WORKER_QUEUE:tkg:ml:tasks}
    result-queue: ${ML_WORKER_RESULT_QUEUE:tkg:ml:results}
    poll-timeout-ms: 30000
    incremental-threshold: 1000
